<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AG Boxing Gym | Coach Access</title>
    
    <!-- 1. STYLES & FONTS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- 2. PWA & MOBILE META TAGS -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="theme-color" content="#0038A8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!-- 3. SERVICE WORKER REGISTRATION (Para sa Offline Capability) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Error', err));
        });
      }
    </script>

    <style>
        /* Loading Screen Logic Styles */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #E5E5E5;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        #login-section, #main-app { display: none; }
        
        /* Quick Style for the Search Box */
        .search-container input::placeholder {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- [A] LOADING SCREEN: Lalabas habang chine-check ang Firebase Auth -->
    <div id="loading-screen">
        <h2 style="font-family: 'Oswald'; color: #0038A8; letter-spacing: 2px;">LOADING...</h2>
    </div>

    <!-- [B] LOGIN SECTION: Ang Gatekeeper ng System -->
    <section id="login-section" class="container">
        <header>
            <div class="logo-box">
                <h1>AG <span class="red-text">BOXING</span> GYM</h1>
                <p class="tagline">COACH ACCESS ONLY</p>
            </div>
        </header>

        <div class="card" style="text-align: center; border-top: 5px solid var(--blue);">
            <h2 class="section-title">Mag-Login, Coach</h2>
            <form id="loginForm">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="coach@agboxing.com" required>
                
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
                
                <button type="submit" id="loginBtn">PUMASOK SA SYSTEM</button>
            </form>
            <p style="font-size: 0.7rem; margin-top: 15px; color: #666;">Contact admin if you forgot your password.</p>
        </div>
    </section>

    <!-- [C] MAIN APP SECTION: Lalabas lang kapag SUCCESS ang Login -->
    <main id="main-app">
        <div class="container">
            
            <!-- App Header: Navigation & Actions -->
            <header style="display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 20px;">
                <div class="logo-box" style="text-align: left; border-bottom: none; margin-bottom: 0;">
                    <h1 style="font-size: 1.2rem;">AG <span class="red-text">BOXING</span></h1>
                </div>
                
                <div style="display: flex; gap: 10px; align-items: center;">
                    <!-- Install Button for PWA -->
                    <button id="pwaInstallBtn" style="display: none; width: auto; padding: 5px 12px; font-size: 0.7rem; background: var(--yellow); color: var(--dark); border-radius: 2px; font-weight: bold;">
                        INSTALL APP
                    </button>
                    <!-- Logout Button -->
                    <button id="logoutBtn" style="width: auto; padding: 5px 12px; font-size: 0.7rem; background: var(--red);">LOGOUT</button>
                </div>
            </header>

            <!-- 1. Inventory Input Form -->
            <section class="card">
                <h2 class="section-title">Magdagdag ng Gamit</h2>
                <form id="inventoryForm">
                    <label>Pangalan ng Equipment</label>
                    <input type="text" id="itemName" placeholder="e.g. Punching Bag" required>
                    
                    <label>Bilang (Quantity)</label>
                    <input type="number" id="itemQty" placeholder="0" required>
                    
                    <button type="submit" id="addBtn">ILISTA SA INVENTORY</button>
                </form>
            </section>

<!-- 2. MODERN LIVE SEARCH BAR (No Button needed) -->
<div class="search-container" style="margin-bottom: 20px; padding: 0 5px;">
    <input type="text" id="searchInput" placeholder="🔍 Maghanap ng equipment..." 
        style="width: 100%; padding: 12px; border: 2px solid var(--blue); border-radius: 5px; font-family: 'Inter'; font-size: 0.9rem; outline: none; box-sizing: border-box; background: var(--white);">
</div>
            </div>

            <!-- 3. Current Inventory List Display -->
            <section class="list-container">
                <h2 class="section-title">Kasalukuyang Stocks (<span id="itemCount">0</span>)</h2>
                <div class="yellow-bar"></div>
                <ul id="inventoryList">
                    <!-- Dynamic Data galing sa Firebase (app.js) -->
                </ul>
            </section>

        </div>
        
        <!-- [D] iOS INSTALL HINT: Lalabas lang sa iPhone Users -->
        <div id="iosInstallHint" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--white); border-top: 5px solid var(--blue); padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); z-index: 10001; border-radius: 8px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/597/597659.png" width="30">
                <div style="font-size: 0.85rem;">
                    <p><strong>Para i-install sa iPhone:</strong></p>
                    <p>Pindutin ang <img src="https://cdn-icons-png.flaticon.com/512/1000/1000966.png" width="15"> <strong>"Share"</strong> icon sa baba, tapos piliin ang <strong>"Add to Home Screen"</strong>. 🥊</p>
                </div>
                <button id="closeIosHint" style="background: none; border: none; font-size: 1.2rem; margin-left: auto;">×</button>
            </div>
        </div>
        
    </main>

    <!-- JS LINK: Module type is mandatory for modern Firebase -->
    <script type="module" src="app.js"></script>

</body>
</html>
